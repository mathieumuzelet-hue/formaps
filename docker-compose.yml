# Cockpit — déploiement Dokploy (derrière Traefik).
# Secrets injectés par Dokploy (variables d'environnement), jamais codés en dur.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cockpit_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    # Pas de `ports:` — la base n'est jamais exposée publiquement.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: .
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      DIFY_API_URL: ${DIFY_API_URL}
      DIFY_API_KEY: ${DIFY_API_KEY}
      # Pont Knowledge Dify (alimentation des datasets depuis le Cockpit) : clé
      # dataset (préfixe `dataset-`, distincte de DIFY_API_KEY App) + ids des
      # datasets cibles. DOIVENT être mappées ici pour atteindre le conteneur ;
      # les variables Dokploy ne servent qu'à l'interpolation compose.
      DIFY_DATASET_API_KEY: ${DIFY_DATASET_API_KEY:-}
      DIFY_QA_DATASET_ID: ${DIFY_QA_DATASET_ID:-}
      DIFY_DOCS_DATASET_ID: ${DIFY_DOCS_DATASET_ID:-}
      # Langue de génération Q&A côté Dify pour les FAQ poussées (case « Chunk au
      # format Q&A dans <langue> »). Vide → défaut `French` dans le code.
      DIFY_QA_DOC_LANGUAGE: ${DIFY_QA_DOC_LANGUAGE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Seuil de pertinence FAQ-gaps (vide → défaut 0.5 dans le code).
      FAQ_RELEVANCE_THRESHOLD: ${FAQ_RELEVANCE_THRESHOLD:-}
      # Rétention RGPD de chat_queries en mois (vide → défaut 12 dans le code).
      CHAT_QUERIES_RETENTION_MONTHS: ${CHAT_QUERIES_RETENTION_MONTHS:-}
      # Bootstrap admin (idempotent au boot) — DOIT être mappé ici pour atteindre
      # le conteneur ; les variables Dokploy ne servent qu'à l'interpolation compose.
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FIRSTNAME: ${BOOTSTRAP_ADMIN_FIRSTNAME:-Admin}
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      # Répertoire des PDF uploadés (monté sur le volume persistant ci-dessous).
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
    volumes:
      # PDF des formations — survit aux redéploiements (uid 1001 propriétaire,
      # voir Dockerfile : le dir /app/uploads est chown nextjs:nodejs avant le
      # premier montage du volume, qui en hérite l'ownership).
      - cockpit_uploads:/app/uploads
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cockpit.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.cockpit.entrypoints=websecure"
      - "traefik.http.routers.cockpit.tls.certresolver=letsencrypt"
      - "traefik.http.services.cockpit.loadbalancer.server.port=3000"
      # Le service `web` doit utiliser le réseau Traefik pour être routable.
      - "traefik.docker.network=dokploy-network"

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Backups offsite S3/R2 — les 4 envs sont à poser dans l'UI Dokploy.
      # Absents → le service logge un avertissement et reste inactif (fail-soft).
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET: ${BACKUP_S3_SECRET:-}
      # Période entre deux backups en secondes (vide → défaut 86400 = 24 h).
      BACKUP_INTERVAL_S: ${BACKUP_INTERVAL_S:-}
    volumes:
      # Lecture seule : le sidecar n'écrit jamais dans les uploads.
      - cockpit_uploads:/uploads:ro
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
  # Réseau Traefik partagé du VPS. L'opérateur DOIT confirmer le nom réel
  # (souvent `dokploy-network`). Dify tourne dans un conteneur séparé sur ce
  # même VPS : sa joignabilité dépend d'un réseau partagé — voir docs/DEPLOY.md.
  dokploy-network:
    external: true

volumes:
  cockpit_pgdata:
  cockpit_uploads:
